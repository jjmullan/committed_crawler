name: 뉴스 크롤링

on:
  schedule:
    # 매일 오전 7시 33분 (KST) = UTC 전날 22:33
    - cron: '33 22 * * *'
  workflow_dispatch: # 수동 실행

jobs:
  crawl-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Yarn 활성화
        run: corepack enable

      - name: 의존성 설치
        run: yarn install --immutable

      - name: Playwright 캐시 복원
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: Playwright Chromium 설치
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install chromium --with-deps

      - name: Playwright 시스템 의존성 설치 (캐시 히트 시)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: yarn playwright install-deps chromium

      - name: 뉴스 크롤링 실행
        run: yarn crawl-news
        env:
          DISCORD_NEWS_WEBHOOK_URL: ${{ secrets.DISCORD_NEWS_WEBHOOK_URL }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: 크롤링 결과 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news-crawl-result.json
          git diff --cached --quiet || git commit -m "chore: 뉴스 크롤링 결과 업데이트 [skip ci]"
          git push
